# Root Cloud Build configuration
# Builds backend and frontend services for CICT Safety F.I.R.S.T. project

steps:
  # Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'backend/Dockerfile'
      - '-t'
      - 'gcr.io/cict-safety-first/cict-safety-first-backend:latest'
      - 'backend'

  # Push backend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/cict-safety-first/cict-safety-first-backend:latest'

  # Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'web/Dockerfile'
      - '-t'
      - 'gcr.io/cict-safety-first/cict-safety-first-frontend:latest'
      - 'web'

  # Push frontend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/cict-safety-first/cict-safety-first-frontend:latest'

# Store built images
images:
  - 'gcr.io/cict-safety-first/cict-safety-first-backend:latest'
  - 'gcr.io/cict-safety-first/cict-safety-first-frontend:latest'

# 30 minute timeout for build
timeout: '1800s'
