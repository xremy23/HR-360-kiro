    <!-- Apple Web App Meta Tags -->

    <!-- Initialize dark mode from localStorage before rendering -->
    <script>
      (function() {
        const savedDarkMode = localStorage.getItem('darkMode');
        const htmlElement = document.documentElement;

        if (savedDarkMode === 'false') {
          // Light mode explicitly requested
          htmlElement.classList.remove('dark');
        } else {
          // Default to dark mode for all other cases
          htmlElement.classList.add('dark');
        }
      })();

      // Initialize runtime API URL configuration
      // This MUST run BEFORE React loads to ensure all services use the correct URL
      (async function initializeConfig() {
        let apiUrl = 'http://localhost:3000/api'; // Default fallback

        try {
          // Try to load from runtime-injected config.json (created by Docker startup script)
          const response = await fetch('/config.json?t=' + Date.now(), {
            cache: 'no-store',
            headers: { 'Cache-Control': 'no-cache' }
          });

          if (response.ok) {
            const config = await response.json();
            if (config.apiUrl) {
              apiUrl = config.apiUrl;
              console.log('[CONFIG] ✅ Loaded API URL from runtime config:', apiUrl);
            }
          } else {
            console.warn('[CONFIG] ⚠️ config.json not found, using fallback');
          }
        } catch (error) {
          console.warn('[CONFIG] ⚠️ Failed to fetch config.json:', error);
        }

        // Make API URL globally available
        window.__API_URL__ = apiUrl;
        console.log('[CONFIG] 🚀 Runtime API URL initialized:', apiUrl);
      })().catch(err => {
        console.error('[CONFIG] Fatal initialization error:', err);
        window.__API_URL__ = 'http://localhost:3000/api';
      });
    </script>

  </head>

  </body>
